<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampilan Checkout Pembayaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .checkout-container { max-width: 600px; margin: 50px auto; }
    </style>
</head>
<body>

<div class="container checkout-container">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4>FORMULIR CHECKOUT</h4>
        </div>
        <div class="card-body p-4">
            <form id="formCheckout">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Produk Yang Dibeli</label>
                    <input type="text" id="produkTerpilih" class="form-control bg-light" readonly>
                </div>

                <div class="mb-3">
                    <label for="namaPembeli" class="form-label fw-bold">Nama Lengkap</label>
                    <input type="text" id="namaPembeli" class="form-control" placeholder="Masukkan nama kamu" required>
                </div>

                <div class="mb-3">
                    <label for="noHp" class="form-label fw-bold">Nomor WhatsApp</label>
                    <input type="tel" id="noHp" class="form-control" placeholder="Contoh: 0812345678" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Metode Pembayaran</label>
                    <select id="metodeBayar" class="form-select" required>
                        <option value="" selected disabled>-- Pilih Metode Pembayaran --</option>
                        <option value="DANA">DANA</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="OVO">OVO</option>
                        <option value="Transfer Bank (BCA/Mandiri)">Transfer Bank</option>
                    </select>
                </div>

                <button type="button" onclick="kirimKeWhatsApp()" class="btn btn-success w-100 py-2 fw-bold">
                    KONFIRMASI & BAYAR SEKARANG
                </button>
                
                <a href="index.html" class="btn btn-link w-100 text-center mt-2 text-decoration-none text-muted">
                    ← Kembali Pilih Produk
                </a>
            </form>
        </div>
    </div>
</div>

<script>
    // 1. JAVASCRIPT UNTUK MEMBACA PRODUK DARI URL
    const urlParams = new URLSearchParams(window.location.search);
    const namaProduk = urlParams.get('produk');
    
    // Masukkan nama produk otomatis ke dalam form input jika ada
    if (namaProduk) {
        document.getElementById('produkTerpilih').value = namaProduk;
    } else {
        document.getElementById('produkTerpilih').value = "Produk Tidak Diketahui";
    }

    // 2. JAVASCRIPT UNTUK MENGIRIM NOTA PESANAN KE WHATSAPP ADMIN
    function kirimKeWhatsApp() {
        // GANTI NOMOR INI DENGAN NOMOR WA KAMU (Gunakan kode 62 di depan)
        const nomorAdmin = "6288905611846"; 

        const produk = document.getElementById('produkTerpilih').value;
        const nama = document.getElementById('namaPembeli').value;
        const noHp = document.getElementById('noHp').value;
        const metode = document.getElementById('metodeBayar').value;

        // Validasi agar form tidak kosong
        if(nama === "" || noHp === "" || metode === "") {
            alert("Harap lengkapi semua data formulir terlebih dahulu!");
            return;
        }

        // Menyusun teks template WhatsApp agar rapi saat diterima admin
        const teksWA = "Halo Admin, saya ingin membeli produk Premium!\n\n" +
                       "====== DETAIL CHECKOUT ======\n" +
                       "📦 Produk : " + produk + "\n" +
                       "👤 Nama Pelanggan : " + nama + "\n" +
                       "📱 No. WhatsApp : " + noHp + "\n" +
                       "💳 Metode Bayar : " + metode + "\n" +
                       "=============================\n\n" +
                       "Mohon infokan detail nomor rekening/e-wallet untuk pembayaran ya min.";

        // Proses encode teks ke URL format
        const urlWhatsApp = "https://wa.me/" + nomorAdmin + "?text=" + encodeURIComponent(teksWA);

        // Buka tab baru mengarah ke WhatsApp pembeli
        window.open(urlWhatsApp, '_blank');
    }
</script>

</body>
</html>
